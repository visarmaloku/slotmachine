<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>visi Slot Machine</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page-bg"></div>

<div class="container">
    <header class="topbar">
        <div class="brand">VISI SLOTS</div>
        <div class="player-info">
            <span id="playerName">Player: —</span>
            <span id="playerScore">Score: 0</span>
            <button id="logoutButton" class="small-btn">Logout</button>
        </div>
    </header>

    <main class="game-area">
        <h2>Spin the Reels</h2>

        <div class="slot-frame">
            <div class="reel-window">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍒</div>
                <div class="reel" id="reel3">🍒</div>
            </div>
        </div>

        <div class="controls">
            <button id="spinButton">SPIN</button>
            <button id="autoButton" class="small-btn">Auto x5</button>
        </div>

        <p id="message" class="message">Click SPIN to play!</p>

        <section class="leaderboard">
            <h3>🏆 Top 10 Players</h3>
            <ul id="leaderboardList"></ul>
        </section>
    </main>

    <footer class="footer">
        <small>Made with ❤️ — Local scores stored in your browser</small>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
